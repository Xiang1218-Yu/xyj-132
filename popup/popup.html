<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickLink Preview 设置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-5z"/>
        </svg>
      </div>
      <div class="title">
        <h1>QuickLink Preview</h1>
        <p>快速预览网页链接</p>
      </div>
    </div>

    <div class="popup-content">
      <div class="section">
        <h2>触发方式</h2>
        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" name="triggerMode" value="hover" id="trigger-hover">
            <span class="radio-label">悬停预览</span>
            <span class="radio-desc">鼠标悬停在链接上显示预览</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="triggerMode" value="click" id="trigger-click">
            <span class="radio-label">点击预览</span>
            <span class="radio-desc">点击链接显示预览（按住 Alt 打开原链接）</span>
          </label>
        </div>
      </div>

      <div class="section" id="hover-delay-section">
        <h2>悬停延迟</h2>
        <div class="slider-container">
          <input type="range" id="hoverDelay" min="100" max="2000" step="100" value="500">
          <span class="slider-value"><span id="hoverDelayValue">500</span> 毫秒</span>
        </div>
      </div>

      <div class="section">
        <h2>预览窗口大小</h2>
        <div class="size-inputs">
          <div class="size-input">
            <label for="previewWidth">宽度</label>
            <input type="number" id="previewWidth" min="300" max="1200" value="600">
            <span class="unit">px</span>
          </div>
          <div class="size-input">
            <label for="previewHeight">高度</label>
            <input type="number" id="previewHeight" min="200" max="800" value="400">
            <span class="unit">px</span>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>启用预览类型</h2>
        <div class="toggle-group">
          <label class="toggle-item">
            <input type="checkbox" id="enableImagePreview" checked>
            <span class="toggle-slider"></span>
            <span class="toggle-label">
              <span class="toggle-title">图片预览</span>
              <span class="toggle-desc">图片链接直接显示图片</span>
            </span>
          </label>
          <label class="toggle-item">
            <input type="checkbox" id="enableVideoPreview" checked>
            <span class="toggle-slider"></span>
            <span class="toggle-label">
              <span class="toggle-title">视频预览</span>
              <span class="toggle-desc">视频文件和视频网站链接</span>
            </span>
          </label>
          <label class="toggle-item">
            <input type="checkbox" id="enableAudioPreview" checked>
            <span class="toggle-slider"></span>
            <span class="toggle-label">
              <span class="toggle-title">音乐预览</span>
              <span class="toggle-desc">音频文件和音乐网站链接</span>
            </span>
          </label>
          <label class="toggle-item">
            <input type="checkbox" id="enableWebpagePreview" checked>
            <span class="toggle-slider"></span>
            <span class="toggle-label">
              <span class="toggle-title">网页预览</span>
              <span class="toggle-desc">普通网页链接显示摘要</span>
            </span>
          </label>
        </div>
      </div>

      <div class="section">
        <h2>黑名单</h2>
        <p class="section-desc">在这些网站上不显示预览（每行一个域名）</p>
        <textarea id="blacklist" placeholder="例如：&#10;example.com&#10;google.com"></textarea>
      </div>
    </div>

    <div class="popup-footer">
      <button class="btn-primary" id="saveBtn">保存设置</button>
    </div>

    <div class="toast" id="toast">设置已保存</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
