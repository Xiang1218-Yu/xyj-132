<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickLink Preview 设置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-5z"/>
        </svg>
      </div>
      <div class="title">
        <h1>QuickLink Preview</h1>
        <p>快速预览网页链接</p>
      </div>
      <div class="tab-switch">
        <button class="tab-btn active" data-tab="settings">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
          设置
        </button>
        <button class="tab-btn" data-tab="history">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
          历史
        </button>
      </div>
    </div>

    <div class="tab-content" id="tab-settings">
      <div class="popup-content">
      <div class="section">
        <h2>触发方式</h2>
        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" name="triggerMode" value="hover" id="trigger-hover">
            <span class="radio-label">悬停预览</span>
            <span class="radio-desc">鼠标悬停在链接上显示预览</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="triggerMode" value="click" id="trigger-click">
            <span class="radio-label">点击预览</span>
            <span class="radio-desc">点击链接显示预览（按住 Alt 打开原链接）</span>
          </label>
        </div>
      </div>

      <div class="section" id="hover-delay-section">
        <h2>悬停延迟</h2>
        <div class="slider-container">
          <input type="range" id="hoverDelay" min="100" max="2000" step="100" value="500">
          <span class="slider-value"><span id="hoverDelayValue">500</span> 毫秒</span>
        </div>
      </div>

      <div class="section">
        <h2>预览窗口大小</h2>
        <div class="size-inputs">
          <div class="size-input">
            <label for="previewWidth">宽度</label>
            <input type="number" id="previewWidth" min="300" max="1200" value="600">
            <span class="unit">px</span>
          </div>
          <div class="size-input">
            <label for="previewHeight">高度</label>
            <input type="number" id="previewHeight" min="200" max="800" value="400">
            <span class="unit">px</span>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>启用预览类型</h2>
        <div class="toggle-group">
          <label class="toggle-item">
            <input type="checkbox" id="enableImagePreview" checked>
            <span class="toggle-slider"></span>
            <span class="toggle-label">
              <span class="toggle-title">图片预览</span>
              <span class="toggle-desc">图片链接直接显示图片</span>
            </span>
          </label>
          <label class="toggle-item">
            <input type="checkbox" id="enableVideoPreview" checked>
            <span class="toggle-slider"></span>
            <span class="toggle-label">
              <span class="toggle-title">视频预览</span>
              <span class="toggle-desc">视频文件和视频网站链接</span>
            </span>
          </label>
          <label class="toggle-item">
            <input type="checkbox" id="enableAudioPreview" checked>
            <span class="toggle-slider"></span>
            <span class="toggle-label">
              <span class="toggle-title">音乐预览</span>
              <span class="toggle-desc">音频文件和音乐网站链接</span>
            </span>
          </label>
          <label class="toggle-item">
            <input type="checkbox" id="enableWebpagePreview" checked>
            <span class="toggle-slider"></span>
            <span class="toggle-label">
              <span class="toggle-title">网页预览</span>
              <span class="toggle-desc">普通网页链接显示摘要</span>
            </span>
          </label>
        </div>
      </div>

      <div class="section">
        <h2>黑名单</h2>
        <p class="section-desc">在这些网站上不显示预览（每行一个域名）</p>
        <textarea id="blacklist" placeholder="例如：&#10;example.com&#10;google.com"></textarea>
      </div>
      </div>

      <div class="popup-footer" id="settings-footer">
        <button class="btn-primary" id="saveBtn">保存设置</button>
      </div>
    </div>

    <div class="tab-content" id="tab-history" style="display:none;">
      <div class="popup-content">
        <div class="history-toolbar">
          <div class="history-search">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" class="search-icon"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="historySearch" placeholder="搜索链接或标题...">
            <button class="search-clear" id="searchClear" style="display:none;">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
          </div>
          <div class="history-filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="webpage">网页</button>
            <button class="filter-btn" data-filter="video">视频</button>
            <button class="filter-btn" data-filter="audio">音频</button>
            <button class="filter-btn" data-filter="image">图片</button>
          </div>
        </div>
        <div class="history-actions">
          <span class="history-count" id="historyCount">0 条记录</span>
          <button class="history-clear-btn" id="clearHistoryBtn">清空历史</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor"><path d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            <p>暂无预览历史</p>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">设置已保存</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
